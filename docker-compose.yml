version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: amana_postgres
    environment:
      POSTGRES_USER: amana_admin
      POSTGRES_PASSWORD: amana_secure_password_123
      POSTGRES_DB: amana_mart_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amana_admin -d amana_mart_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: amana_redis
    command: redis-server --requirepass amana_redis_secure_123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
